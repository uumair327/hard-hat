name: hard_hat
description: "Hard Hat Havoc - A tile destruction puzzle platformer built with Flutter Flame"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # Game Engine
  flame: ^1.34.0
  
  # Audio
  flame_audio: ^2.1.4
  
  # Persistence
  shared_preferences: ^2.2.2
  
  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^5.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

flutter:
  uses-material-design: true

  # Game Assets (converted from Godot)
  assets:
    # Game sprites
    - assets/images/sprites/game/player/
    - assets/images/sprites/game/splash/
    - assets/images/sprites/game/billboard/
    - assets/images/sprites/game/particles/
    - assets/images/sprites/game/hud/
    - assets/images/sprites/game/
    - assets/images/sprites/tiles/
    
    # UI sprites
    - assets/images/sprites/ui/
    - assets/images/sprites/comic/
    - assets/images/sprites/level_select/
    - assets/images/sprites/logo/
    - assets/images/sprites/misc/
    
    # Audio assets
    - assets/audio/music/
    - assets/audio/sfx/
    - assets/audio/loop/
